<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>ResetYourFuture.Client</title>
    <base href="/" />
    <style>
        /* Critical boot-screen styles inlined to prevent FOUC during culture-switch reloads.
           app.css keeps the authoritative copy; this block ensures the compass is styled
           from the very first paint, before any external stylesheet has loaded. */
        .compass-boot {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh;
            background-color: #0a0c20; gap: 1.25rem;
        }
        .compass-boot__svg {
            width: 140px; height: 140px; overflow: visible;
            animation: compass-boot-glow 2.8s ease-in-out infinite;
        }
        .compass-boot__ring-outer  { fill: none; stroke: rgba(172,173,190,0.25); stroke-width: 1.5; }
        .compass-boot__tick-cardinal { stroke: rgba(206,200,240,0.75); stroke-width: 2; stroke-linecap: round; }
        .compass-boot__tick-minor  { stroke: rgba(206,200,240,0.3);  stroke-width: 1; stroke-linecap: round; }
        .compass-boot__cardinal-n  {
            fill: rgba(206,200,240,0.7); font-size: 9px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 700; text-anchor: middle; dominant-baseline: central;
        }
        .compass-boot__arc-track   { fill: none; stroke: rgba(196,124,180,0.15); stroke-width: 3; }
        .compass-boot__arc-progress {
            fill: none; stroke: #C47CB4; stroke-width: 3; stroke-linecap: round;
            transform-origin: 60px 60px; transform: rotate(-90deg);
            stroke-dasharray: calc(2.9531 * var(--blazor-load-percentage, 0%)), 295.31;
            transition: stroke-dasharray 0.12s ease-out;
            filter: drop-shadow(0 0 5px rgba(196,124,180,0.65));
        }
        .compass-boot__ring-inner  { fill: none; stroke: rgba(172,173,190,0.15); stroke-width: 0.8; }
        .compass-boot__needle-group {
            transform-origin: 60px 60px;
            animation: compass-needle-seek 4s linear infinite;
            will-change: transform;
        }
        .compass-boot__needle-north { fill: #C47CB4; }
        .compass-boot__needle-south { fill: rgba(206,200,240,0.45); }
        .compass-boot__center       { fill: #C47CB4; }
        .compass-boot__center-inner { fill: #0a0c20; }
        .compass-boot__label {
            color: rgba(206,200,240,0.6);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
        }
        .compass-boot__label::after { content: var(--blazor-load-percentage-text, "Loading"); }

        @keyframes compass-needle-seek {
            0%   { transform: rotate(0deg); }
            30%  { transform: rotate(290deg); }
            45%  { transform: rotate(348deg); }
            55%  { transform: rotate(368deg); }
            65%  { transform: rotate(355deg); }
            72%  { transform: rotate(362deg); }
            78%  { transform: rotate(358deg); }
            84%  { transform: rotate(360deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes compass-boot-glow {
            0%, 100% { filter: drop-shadow(0 0 8px  rgba(196,124,180,0.2)); }
            50%       { filter: drop-shadow(0 0 20px rgba(196,124,180,0.5)); }
        }
    </style>
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/shared-components.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="ResetYourFuture.Client.styles.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div class="compass-boot" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background-color:#0a0c20;gap:1.25rem">
            <svg class="compass-boot__svg"
                 width="140" height="140"
                 viewBox="0 0 120 120"
                 xmlns="http://www.w3.org/2000/svg">

                <!-- Outer bezel ring -->
                <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(172,173,190,0.25)" stroke-width="1.5" class="compass-boot__ring-outer" />

                <!-- Cardinal ticks: N / E / S / W -->
                <line x1="60"  y1="6"   x2="60"  y2="18"  stroke="rgba(206,200,240,0.75)" stroke-width="2" stroke-linecap="round" class="compass-boot__tick-cardinal" />
                <line x1="114" y1="60"  x2="102" y2="60"  stroke="rgba(206,200,240,0.75)" stroke-width="2" stroke-linecap="round" class="compass-boot__tick-cardinal" />
                <line x1="60"  y1="114" x2="60"  y2="102" stroke="rgba(206,200,240,0.75)" stroke-width="2" stroke-linecap="round" class="compass-boot__tick-cardinal" />
                <line x1="6"   y1="60"  x2="18"  y2="60"  stroke="rgba(206,200,240,0.75)" stroke-width="2" stroke-linecap="round" class="compass-boot__tick-cardinal" />

                <!-- Diagonal minor ticks: NE / SE / SW / NW -->
                <line x1="98" y1="22" x2="93" y2="27" stroke="rgba(206,200,240,0.3)" stroke-width="1" stroke-linecap="round" class="compass-boot__tick-minor" />
                <line x1="98" y1="98" x2="93" y2="93" stroke="rgba(206,200,240,0.3)" stroke-width="1" stroke-linecap="round" class="compass-boot__tick-minor" />
                <line x1="22" y1="98" x2="27" y2="93" stroke="rgba(206,200,240,0.3)" stroke-width="1" stroke-linecap="round" class="compass-boot__tick-minor" />
                <line x1="22" y1="22" x2="27" y2="27" stroke="rgba(206,200,240,0.3)" stroke-width="1" stroke-linecap="round" class="compass-boot__tick-minor" />

                <!-- N label -->
                <text x="60" y="24" fill="rgba(206,200,240,0.7)" font-size="9" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-weight="700" text-anchor="middle" dominant-baseline="central" class="compass-boot__cardinal-n">N</text>

                <!-- Arc track (faint background) -->
                <circle cx="60" cy="60" r="47" fill="none" stroke="rgba(196,124,180,0.15)" stroke-width="3" class="compass-boot__arc-track" />

                <!-- Progress arc driven by --blazor-load-percentage -->
                <circle cx="60" cy="60" r="47" fill="none" stroke="#C47CB4" stroke-width="3" stroke-linecap="round" class="compass-boot__arc-progress" />

                <!-- Inner decorative ring -->
                <circle cx="60" cy="60" r="34" fill="none" stroke="rgba(172,173,190,0.15)" stroke-width="0.8" class="compass-boot__ring-inner" />

                <!-- Compass needle -->
                <g class="compass-boot__needle-group">
                    <path d="M60,32 L55,62 L60,61 L65,62 Z" fill="#C47CB4" class="compass-boot__needle-north" />
                    <path d="M60,82 L56,60 L60,59 L64,60 Z" fill="rgba(206,200,240,0.45)" class="compass-boot__needle-south" />
                </g>

                <!-- Center pivot -->
                <circle cx="60" cy="60" r="4.5" fill="#C47CB4" class="compass-boot__center" />
                <circle cx="60" cy="60" r="2"   fill="#0a0c20" class="compass-boot__center-inner" />

            </svg>
            <span class="compass-boot__label"></span>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
    <script src="js/quill-interop.js"></script>
    <script src="js/chat-interop.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
